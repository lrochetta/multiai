# CI for the Go reference implementation (multiai-go/).
#
# MONOREPO NOTE: this root workflow is authoritative. CI verifies that the
# checked mirror under multiai-go/.github/ is byte-for-byte identical.
#
# All actions are pinned by full commit SHA (audit v0.2.1, finding #14).
# gofmt + go vet + gosec + govulncheck + golangci-lint cover the essentials.

name: CI

on:
  push:
    branches: [master, main]
    paths:
      - "multiai-go/**"
      - ".github/**"
      - ".gitleaks.toml"
  pull_request:
    paths:
      - "multiai-go/**"
      - ".github/**"
      - ".gitleaks.toml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: multiai-go

jobs:
  workflow-sync:
    name: Workflow source-of-truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Reject stale module mirrors
        shell: pwsh
        working-directory: .
        run: ./multiai-go/scripts/sync-workflows.ps1 -Check

  lint:
    name: Lint
    needs: workflow-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12' # Go 1.26.5 binaries trigger CyberCapture on affected Windows hosts.
          cache-dependency-path: multiai-go/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.14.0'
      - name: npm packaging tests
        run: npm test --prefix packaging/npm
      - name: gosec
        # G104 (unhandled errors on prints/exits) excluded, as in .golangci.yml.
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.25.0 -exclude=G104 -severity=high -confidence=high ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: multiai-go
          version: v2.11.0

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Test
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: coverage
          path: multiai-go/coverage.out

  security:
    name: Security scan
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  benchmark:
    name: Benchmark
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Run benchmarks
        run: go test -bench=. -benchmem ./tests/ 2>&1 | tee benchmark.txt
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: benchmark
          path: multiai-go/benchmark.txt

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Build
        run: go build -o multiai${{ startsWith(matrix.os, 'windows') && '.exe' || '' }} ./cmd/multiai/
      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: multiai-${{ matrix.os }}
          path: multiai-go/multiai${{ startsWith(matrix.os, 'windows') && '.exe' || '' }}

  smoke:
    name: Smoke test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Build and smoke
        run: |
          go build -o multiai ./cmd/multiai/
          ./multiai version && ./multiai list --json

  release-check:
    name: GoReleaser config check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true
      - name: goreleaser check
        run: goreleaser check
      - name: goreleaser snapshot build
        run: goreleaser build --snapshot --clean

  compile-check:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Cross-compile
        run: go build -o /dev/null ./cmd/multiai/
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

  secret-scan:
    name: Secret scan (gitleaks)
    needs: workflow-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: multiai-go/go.sum
      - name: Scan complete Git history
        working-directory: .
        run: go run github.com/zricethezav/gitleaks/v8@v8.28.0 git --config .gitleaks.toml --redact --verbose --no-banner .
