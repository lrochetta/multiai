# Release pipeline: GoReleaser + checksums + Cosign keyless + GitHub provenance.
#
# MONOREPO NOTE: GitHub only executes workflows located in
# <repo root>/.github/workflows/. This root file is authoritative. The copy
# under multiai-go/.github/ is a checked mirror maintained by:
#   multiai-go/scripts/sync-workflows.ps1
#
# All actions are pinned by full commit SHA (audit v0.2.1, finding #14).
#
# Publishing policy:
#   - npm is NOT published here. The npm package `multiai` switches to the Go
#     binary only at feature parity, published manually by laurent
#     (see multiai-go/packaging/npm/).
#   - Homebrew formula / Scoop manifest are generated by GoReleaser into
#     dist/ (skip_upload: true) and attached knowledge for a manual first
#     publication. See multiai-go/.goreleaser.yaml.
#   - AUR: PKGBUILD and .SRCINFO are updated in-place on the master branch
#     after each release. The AUR repository itself is pushed only when
#     AUR_SSH_KEY is configured (see the 'aur' job).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release gate (source, tests, security)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify tag is a version on master
        env:
          RELEASE_REF: ${{ github.ref }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::invalid release tag: $RELEASE_TAG"
            exit 1
          }
          git fetch --no-tags origin master
          git merge-base --is-ancestor "$RELEASE_REF" origin/master || {
            echo "::error::tag $RELEASE_TAG is not a descendant of master"
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: multiai-go/go.sum

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.14.0'

      - name: Verify workflow mirrors
        shell: pwsh
        run: ./multiai-go/scripts/sync-workflows.ps1 -Check

      - name: Require a reviewer-protected release environment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/environments/release" |
            jq -e '.protection_rules | any(.type == "required_reviewers")' >/dev/null || {
              echo "::error::GitHub environment 'release' must exist and require at least one reviewer."
              exit 1
            }

      - name: Verify release version contract
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ! grep -Eq '^var version' multiai-go/cmd/multiai/main.go; then
            echo "::error file=multiai-go/cmd/multiai/main.go::version must remain injectable"
            exit 1
          fi
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./multiai-go/packaging/npm/package.json').version")"
          test "$TAG_VERSION" = "$PACKAGE_VERSION" || {
            echo "::error file=multiai-go/packaging/npm/package.json::tag $RELEASE_TAG does not match npm package $PACKAGE_VERSION"
            exit 1
          }

      - name: Verify formatting
        working-directory: multiai-go
        run: |
          unformatted="$(gofmt -l .)"
          test -z "$unformatted" || {
            echo "::error::gofmt required for: $unformatted"
            exit 1
          }

      - name: Run tests with race detector
        working-directory: multiai-go
        run: go test -race ./...

      - name: Run vet
        working-directory: multiai-go
        run: go vet ./...

      - name: Run npm packaging contract tests
        run: npm test --prefix multiai-go/packaging/npm

      - name: Scan packaged profiles for secrets
        run: node multiai-go/packaging/npm/scan-secrets.js

      - name: Scan complete Git history for secrets
        run: go run github.com/zricethezav/gitleaks/v8@v8.28.0 git --config .gitleaks.toml --redact --verbose --no-banner .

      - name: Run gosec
        working-directory: multiai-go
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.25.0 -exclude=G104 -severity=high -confidence=high ./...

      - name: Run govulncheck
        working-directory: multiai-go
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  goreleaser:
    name: GoReleaser (build, checksums, sign, attest)
    needs: [preflight]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload assets
      id-token: write # Cosign keyless signing (Fulcio OIDC)
      attestations: write # GitHub build provenance
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: multiai-go/go.sum

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          workdir: multiai-go
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build provenance for every released archive, keyed off checksums.txt.
      # NOTE: attestations require a PUBLIC repository (or GitHub Enterprise
      # Cloud). The step is skipped while the repo is private instead of
      # failing the whole release.
      - name: Attest build provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-checksums: multiai-go/dist/checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          path: ./multiai-go
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "$RELEASE_TAG" sbom.cyclonedx.json --clobber

      - name: Publish verified release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false

  aur:
    name: Update AUR PKGBUILD
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      contents: write # push updated PKGBUILD / .SRCINFO to master
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Checkout master (the tag-based trigger leaves us on the tag)
          ref: master
          fetch-depth: 1

      - name: Pin checksums
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Strip 'v' prefix from ref to get semver: refs/tags/v0.5.0 -> 0.5.0
          VERSION="$RELEASE_TAG"
          VERSION="${VERSION#v}"
          bash multiai-go/scripts/update-aur-checksums.sh "$VERSION"

      - name: Commit updated PKGBUILD and .SRCINFO
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add multiai-go/packaging/aur/PKGBUILD multiai-go/packaging/aur/.SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to PKGBUILD — skipping commit."
          else
            git commit -m "chore: pin AUR checksums for $RELEASE_TAG"
            git push
          fi

      - name: Push to AUR repository
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          AUR_KNOWN_HOSTS: ${{ secrets.AUR_KNOWN_HOSTS }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_KEY not set — skipping AUR push."
            echo "Set the secret to enable automatic AUR publishing."
            exit 0
          fi
          if [ -z "$AUR_KNOWN_HOSTS" ]; then
            echo "::error::AUR_KNOWN_HOSTS is required when AUR_SSH_KEY is configured."
            exit 1
          fi

          # Set up SSH key for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          printf '%s\n' "$AUR_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
          EOF

          # Clone AUR repo
          git clone aur@aur.archlinux.org:multiai.git /tmp/aur-repo

          # Copy updated files
          cp multiai-go/packaging/aur/PKGBUILD /tmp/aur-repo/
          cp multiai-go/packaging/aur/.SRCINFO /tmp/aur-repo/

          # Commit and push
          cd /tmp/aur-repo
          git config user.name "Laurent Rochetta"
          git config user.email "laurent@rochetta.fr"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR PKGBUILD unchanged — skipping push."
          else
            git commit -m "upstream $RELEASE_TAG"
            git push
          fi
