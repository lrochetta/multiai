# Release pipeline: GoReleaser + checksums + Cosign keyless + GitHub provenance.
#
# MONOREPO NOTE: GitHub only executes workflows located in
# <repo root>/.github/workflows/. This file is maintained here (next to the Go
# module) and must be deployed to the repo root with:
#   multiai-go/scripts/sync-workflows.ps1
#
# All actions are pinned by full commit SHA (audit v0.2.1, finding #14).
#
# Publishing policy:
#   - npm is NOT published here. The npm package `multiai` switches to the Go
#     binary only at feature parity, published manually by laurent
#     (see multiai-go/packaging/npm/).
#   - Homebrew cask / Scoop manifest are generated by GoReleaser into
#     dist/ (skip_upload conditional on TAP_GITHUB_TOKEN) and attached
#     knowledge for a manual first publication. See multiai-go/.goreleaser.yaml.
#   - APT repository is published to GitHub Pages (gh-pages branch) with
#     GPG-signed Release files. See multiai-go/packaging/apt/README.md.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor ${{ github.ref }} origin/master || {
            echo "ERROR: Tag is not a descendant of master"
            exit 1
          }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache-dependency-path: multiai-go/go.sum
      - name: Run tests
        run: cd multiai-go && go test -race ./...
      - name: Run vet
        run: cd multiai-go && go vet ./...

  goreleaser:
    name: GoReleaser (build, checksums, sign, attest)
    needs: [preflight]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload assets
      id-token: write # Cosign keyless signing (Fulcio OIDC)
      attestations: write # GitHub build provenance
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache-dependency-path: multiai-go/go.sum

      - name: Preflight — version must be injectable
        run: |
          if ! grep -Eq '^var version' multiai-go/cmd/multiai/main.go; then
            echo "::error file=multiai-go/cmd/multiai/main.go::declare 'var version = ...' (not const) so -ldflags -X main.version=... can inject the release version"
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: multiai-go
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Build provenance for every released archive, keyed off checksums.txt.
      # NOTE: attestations require a PUBLIC repository (or GitHub Enterprise
      # Cloud). The step is skipped while the repo is private instead of
      # failing the whole release.
      - name: Attest build provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-checksums: multiai-go/dist/checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0 # v0.18.0
        with:
          path: ./multiai-go
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} sbom.cyclonedx.json --clobber

  apt-repo:
    name: Publish APT repository to gh-pages
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source (generator script + GPG key)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: source
          fetch-depth: 0

      - name: Checkout gh-pages branch (create if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "multiai-bot"
          git config --global user.email "laurent@rochetta.fr"
          git clone --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages 2>/dev/null || {
            echo "gh-pages branch does not exist — creating orphan branch..."
            mkdir -p gh-pages
            cd gh-pages
            git init
            git checkout --orphan gh-pages
            git remote add origin \
              "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          }

      - name: Install APT repository tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev apt-utils

      - name: Download .deb files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p debs
          gh release download "${{ github.ref_name }}" \
            --pattern "*.deb" \
            --dir ./debs

      - name: Import GPG signing key
        env:
          APT_GPG_KEY: ${{ secrets.APT_GPG_KEY }}
        run: |
          if [ -n "$APT_GPG_KEY" ]; then
            echo "$APT_GPG_KEY" | gpg --import --batch 2>&1
            echo "GPG key imported successfully"
          else
            echo "APT_GPG_KEY secret not set — repository will be unsigned"
          fi

      - name: Generate APT repository
        run: |
          bash source/multiai-go/scripts/generate-apt-repo.sh \
            --debs ./debs \
            --repo ./gh-pages/apt \
            --suite stable \
            --gpg-key "laurent@rochetta.fr"

      - name: Copy GPG public key to repo root
        run: |
          mkdir -p gh-pages/apt
          cp source/multiai-go/packaging/apt/gpg-public.key gh-pages/apt/

      - name: Commit and push to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to APT repository — skipping push"
          else
            git commit -m "Update APT repository for ${{ github.ref_name }}

            Auto-generated by the release workflow.
            Packages updated: ${{ github.ref_name }}"
            git push origin gh-pages
          fi
