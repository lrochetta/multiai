version: 2

before:
  hooks:
    - go mod tidy
    - go test -race ./...

builds:
  - id: multiai
    main: ./cmd/multiai/
    binary: multiai
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: multiai
    repository:
      owner: lrochetta
      name: homebrew-tap
    homepage: https://rochetta.fr
    description: Route multiple AI CLIs (Claude Code, Codex, OpenCode) with isolated env profiles

scoops:
  - name: multiai
    repository:
      owner: lrochetta
      name: scoop-bucket
    homepage: https://rochetta.fr
    description: Route multiple AI CLIs with isolated env profiles

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
