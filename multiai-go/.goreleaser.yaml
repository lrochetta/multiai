# GoReleaser v2 configuration for multiai (Go reference implementation).
#
# Monorepo note: this module lives in multiai-go/ inside the repository.
# GoReleaser must run FROM this directory (the release workflow sets
# `workdir: multiai-go`). Tags are repo-wide (v*).
#
# Version injection: cmd/multiai/main.go MUST declare
#     var version = "..."
# (a `const` cannot be overridden by -ldflags -X; the release workflow has a
# preflight check that fails fast if main.go still uses `const version`).
#
# Signing (0 EUR plan):
#   - checksums.txt for every archive (sha256)
#   - Cosign keyless bundle for checksums.txt (OIDC via GitHub Actions)
#   - GitHub build provenance attestation (done in the workflow, not here)
#
# Verify a download:
#   cosign verify-blob \
#     --bundle checksums.txt.sigstore.json \
#     --certificate-identity-regexp 'https://github.com/lrochetta/multiai' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
#   sha256sum --check --ignore-missing checksums.txt

version: 2

project_name: multiai

before:
  hooks:
    - go mod download

builds:
  - id: multiai
    main: ./cmd/multiai
    binary: multiai
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # windows/arm64 is not a supported target (yet).
      - goos: windows
        goarch: arm64

archives:
  - id: default
    # multiai_<version>_<os>_<arch>.tar.gz|.zip — keep in sync with
    # packaging/npm/install.js and scripts/install.sh.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Keyless Cosign bundle. The release workflow installs a pinned Cosign binary
# and grants id-token: write. GoReleaser fails the release if signing fails.
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    output: true
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

# Debian packages built natively by GoReleaser (nfpm). This replaces the
# checksum-less local script packaging/deb/build-deb.sh (kept as a dev
# fallback only).
#
# The APT repository is published to GitHub Pages (gh-pages) after each
# release. See scripts/generate-apt-repo.sh and packaging/apt/README.md.
#
# Package naming convention (matches the APT pool path):
#   multiai_<version>_<arch>.deb
nfpms:
  - id: deb
    package_name: multiai
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    formats: [deb]
    maintainer: Laurent Rochetta <laurent@rochetta.fr>
    homepage: https://rochetta.fr
    license: MIT
    section: devel
    priority: optional
    bindir: /usr/bin
    description: |-
      Route multiple AI CLIs with isolated env profiles.
      multiai routes between multiple AI CLIs (Claude Code, Codex CLI,
      OpenCode) using isolated environment profiles. It provides a unified
      interface for launching different AI tools with provider-specific
      API keys and configuration.
    scripts:
      postinstall: packaging/deb/postinst

# Homebrew cask and Scoop manifest — GENERATED at release time with the real
# sha256 of the archives. Both are always produced in dist/; auto-push to the
# tap/bucket repo only happens when TAP_GITHUB_TOKEN is set.
#
# (`brews` is deprecated since GoReleaser 2.10; casks are the supported way
# to ship prebuilt binaries.)
#
# Token behavior:
#   - TAP_GITHUB_TOKEN set    → skip_upload = false (push to tap/bucket repo)
#   - TAP_GITHUB_TOKEN unset  → skip_upload = true  (generate manifest only)
#
# Repositories:
#   - github.com/lrochetta/homebrew-tap  (Homebrew)
#   - github.com/lrochetta/scoop-bucket  (Scoop)
#
# See docs in packaging/homebrew/ and packaging/scoop/.

# Homebrew cask + Scoop disabled until TAP_GITHUB_TOKEN is configured.
# The GoReleaser v2 schema requires `repository` (not `tap`/`bucket`).
# See packaging/homebrew/ and packaging/scoop/ for manual setup instructions.
# homebrew_casks:
#   - name: multiai
#     repository:
#       owner: lrochetta
#       name: homebrew-tap
#     homepage: "https://github.com/lrochetta/multiai"
#     description: "Route multiple AI CLIs with isolated env profiles."
#     license: "MIT"
# scoops:
#   - name: multiai
#     repository:
#       owner: lrochetta
#       name: scoop-bucket
#     homepage: "https://github.com/lrochetta/multiai"
#     description: "Route multiple AI CLIs with isolated env profiles."
#     license: "MIT"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

release:
  github:
    owner: lrochetta
    name: multiai
  # The workflow promotes the draft only after signing, provenance and SBOM
  # publication have all succeeded. A failed post-build gate therefore cannot
  # leave a partially verified release public.
  draft: true
  prerelease: auto
  footer: |
    ## Verifier un telechargement

    ```sh
    sha256sum --check --ignore-missing checksums.txt
    cosign verify-blob \
      --bundle checksums.txt.sigstore.json \
      --certificate-identity-regexp 'https://github.com/lrochetta/multiai' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
