linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - gosimple
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec

linters-settings:
  gosec:
    excludes:
      - G104  # syscall exit after Printf is fine for CLI
  misspell:
    locale: US

run:
  timeout: 5m
  tests: true
