# LiteLLM bridge config for NVIDIA build.nvidia.com (NIM hosted catalog).
#
# Used by the multiai profiles:
#   nv-cc    — Claude Code  (NVIDIA has no Anthropic /v1/messages endpoint)
#   codex-nv — Codex CLI    (Codex 2026 requires the Responses API; NVIDIA
#                            only serves /v1/chat/completions)
#   nv-*     — dynamic claude/codex profiles created from the NVIDIA menu
# OpenCode profiles (ocnvidia) talk to NVIDIA directly and do NOT need this.
#
# Launch (reads the key from NVIDIA_NIM_API_KEY):
#   scripts/nvidia-bridge.ps1
#   # or: litellm --config scripts/nvidia-litellm.yaml --port 4000 --host 127.0.0.1
#
# Install: pip install "litellm[proxy]"
# SECURITY: do NOT install litellm 1.82.7 or 1.82.8 (compromised PyPI
# releases); use the latest clean release.

model_list:
  # Wildcard passthrough: any requested model is forwarded as
  # nvidia_nim/<model>, e.g. "z-ai/glm-5.2" -> "nvidia_nim/z-ai/glm-5.2".
  # Works for every model of https://build.nvidia.com (all free, ~40 req/min).
  - model_name: "*"
    litellm_params:
      model: "nvidia_nim/*"
      api_key: os.environ/NVIDIA_NIM_API_KEY
      drop_params: true

  # Safety net: if a client ever asks for a Claude alias without the
  # multiai profile overrides, serve GLM 5.2 instead of a 404.
  - model_name: "claude-*"
    litellm_params:
      model: "nvidia_nim/z-ai/glm-5.2"
      api_key: os.environ/NVIDIA_NIM_API_KEY
      drop_params: true

litellm_settings:
  drop_params: true
